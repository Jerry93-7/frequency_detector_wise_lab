# Available runners configured by board.cmake.
runners:
- openocd
- esp32

# Default flash runner if --runner is not given.
flash-runner: esp32

# Default debug runner if --runner is not given.
debug-runner: openocd

# Common runner configuration values.
config:
  board_dir: /home/jerryfen/zephyrproject/zephyr/boards/espressif/esp32c6_devkitc
  # Build outputs:
  elf_file: zephyr.elf
  bin_file: zephyr.bin
  # Host tools:
  gdb: /home/jerryfen/zephyr-sdk-0.17.4/riscv64-zephyr-elf/bin/riscv64-zephyr-elf-gdb
  openocd: /home/jerryfen/zephyr-sdk-0.17.4/sysroots/x86_64-pokysdk-linux/usr/bin/openocd
  openocd_search:
    - /home/jerryfen/zephyr-sdk-0.17.4/sysroots/x86_64-pokysdk-linux/usr/share/openocd/scripts

# Runner specific arguments
args:
  openocd:
    - --cmd-load
    - flash write_image erase
    - --cmd-verify
    - verify_image
    - --no-halt
    - --no-targets
    - --no-load
    - --target-handle
    - _TARGETNAME_0
    - --gdb-init
    - set remote hardware-watchpoint-limit 4
    - --gdb-init
    - maintenance flush register-cache
    - --gdb-init
    - mon esp appimage_offset 0x0
    - --gdb-init
    - mon reset halt
    - --gdb-init
    - thb main
    - --use-bin
    - --flash-address=0x0
    - --cmd-load
    - program_esp
    - --cmd-verify
    - esp verify_bank_hash 0
  esp32:
    - --esp-monitor-baud=115200
    - --esp-idf-path=/home/jerryfen/zephyrproject/modules/hal/espressif
    - --esp-app-address=0x0
    - --esp-flash-size=8MB
    - --esp-flash-freq=80m
    - --esp-flash-mode=dio
    - --esp-idf-path=/home/jerryfen/zephyrproject/modules/hal/espressif
